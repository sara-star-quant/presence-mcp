name: release

# Publishes to PyPI on tag push (vX.Y.Z), then attaches the built artifacts to a GitHub Release.
# The MCP Registry update (`mcp-publisher publish`) is kept manual so a human reviews the server.json delta before each listing.
#
# PyPI Trusted Publishing must be configured on the PyPI side before the first run: https://docs.pypi.org/trusted-publishers/.
#   Owner: sara-star-quant
#   Repository: presence-mcp
#   Workflow: release.yml
#   Environment: pypi

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke-test the built wheel
        env:
          PRESENCE_MCP_CLI: /tmp/presence-mcp-smoke-missing.py
        run: |
          set -e
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          # Confirm the console script is installed and the negative path (env var pointing at a missing file) produces exit 1 with the expected diagnostic on stderr.
          # Catches missing entry points or broken imports before we upload to PyPI.
          set +e
          out=$(/tmp/smoke/bin/presence-mcp 2>&1 >/dev/null)
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "expected exit 1 from negative-path smoke, got $rc" >&2
            echo "$out" >&2
            exit 1
          fi
          echo "$out" | grep -q "no file exists"
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0  # v1.9.0

  github-release:
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* --generate-notes

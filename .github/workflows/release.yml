name: release

# Publishes to PyPI on tag push (vX.Y.Z), then attaches the built artifacts to a GitHub Release.
# The MCP Registry update (`mcp-publisher publish`) is kept manual so a human reviews the server.json delta before each listing.
#
# PyPI Trusted Publishing must be configured on the PyPI side before the first run: https://docs.pypi.org/trusted-publishers/.
#   Owner: sara-star-quant
#   Repository: presence-mcp
#   Workflow: release.yml
#   Environment: pypi

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke-test the built wheel
        env:
          PRESENCE_MCP_CLI: /tmp/presence-mcp-smoke-missing.py
        run: |
          set -e
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          # Confirm the console script is installed and the negative path (env var pointing at a missing file) produces exit 1 with the expected diagnostic on stderr.
          # Catches missing entry points or broken imports before we upload to PyPI.
          set +e
          out=$(/tmp/smoke/bin/presence-mcp 2>&1 >/dev/null)
          rc=$?
          set -e
          if [ "$rc" -ne 1 ]; then
            echo "expected exit 1 from negative-path smoke, got $rc" >&2
            echo "$out" >&2
            exit 1
          fi
          echo "$out" | grep -q "no file exists"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  github-release:
    needs: pypi-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* --generate-notes

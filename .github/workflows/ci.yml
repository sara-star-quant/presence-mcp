name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest

  validate-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" jsonschema
      - name: Check versions are in sync
        run: python scripts/check_versions.py
      - name: Validate server.json against the registry schema
        env:
          SERVER_JSON: server.json
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request
          import jsonschema
          server = json.loads(open(os.environ["SERVER_JSON"]).read())
          schema_url = server["$schema"]
          schema = json.loads(urllib.request.urlopen(schema_url).read())
          jsonschema.validate(server, schema)
          print(f"OK: {os.environ['SERVER_JSON']} validates against {schema_url}")
          PY

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Test
        run: pytest

  validate-listing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" jsonschema
      - name: Check versions are in sync
        run: python scripts/check_versions.py
      - name: Check README contains the MCP Registry verification marker
        run: |
          set -eu
          name=$(python -c "import json; print(json.load(open('server.json'))['name'])")
          marker="<!-- mcp-name: ${name} -->"
          if ! grep -q -F "${marker}" README.md; then
            echo "README.md is missing the registry verification marker: ${marker}" >&2
            echo "The registry verifier reads the PyPI long description and requires this exact string." >&2
            exit 1
          fi
          echo "OK: README.md contains marker for ${name}"
      - name: Validate server.json against the registry schema
        env:
          SERVER_JSON: server.json
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request
          import jsonschema
          server = json.loads(open(os.environ["SERVER_JSON"]).read())
          schema_url = server["$schema"]
          schema = json.loads(urllib.request.urlopen(schema_url).read())
          jsonschema.validate(server, schema)
          print(f"OK: {os.environ['SERVER_JSON']} validates against {schema_url}")
          PY
